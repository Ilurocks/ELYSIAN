<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Elysian Acres</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">ELYSIAN <span>ACRES</span></div>
            <nav class="side-nav">
                <a href="#" class="active">📊 Overview</a>
                <a href="index.html">🏠 View Site</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h1>Enquiry Dashboard</h1>
                <div class="user-info">Admin Account</div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <h3>Total Inquiries</h3>
                    <p id="total-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Recent (24h)</h3>
                    <p id="recent-count">0</p>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h2>Recent Enquiries</h2>
                    <button id="refresh-btn">Refresh Data</button>
                </div>
                <table id="enquiries-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Subject</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
                <div id="loading" class="loading">Loading enquiries...</div>
                <div id="no-data" class="no-data" style="display: none;">No enquiries found.</div>
            </div>
        </main>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-name"></h2>
            <p id="modal-email" class="modal-email"></p>
            <hr>
            <p id="modal-message" class="modal-message"></p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
